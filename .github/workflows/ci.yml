name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s 0.10.3

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Moon Info
        run: moon info

      - name: Moon Check
        run: moon check

      - name: Moon Format Check
        run: moon fmt --check

      - name: Moon Test
        run: moon test
